enabled_topics:
  default: ""
  type: list
  description: "Comma-separated topic IDs allowed for preview"

hover_delay_ms:
  default: 180
  type: integer
  description: "Delay before showing tooltip"

preview_mode:
  default: excerpt
  type: enum
  choices:
    - excerpt
    - cooked
  description: "Use excerpt or first-post cooked HTML"
